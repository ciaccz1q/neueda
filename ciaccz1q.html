<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neueda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #1a1a2e;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: white;
        }

        main {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .hero {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }

        .hero h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #1a1a2e;
        }

        .hero p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: #1a1a2e;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #16213e;
        }

        footer {
            background: #1a1a2e;
            color: #aaa;
            text-align: center;
            padding: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Neueda</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h2>Welcome to Neueda</h2>
            <p>Building innovative technology solutions to help businesses grow and transform. Explore our services and discover how we can work together.</p>
            <a href="#" class="btn">Get Started</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Neueda. All rights reserved.</p>
    </footer>
</body>
</html>
